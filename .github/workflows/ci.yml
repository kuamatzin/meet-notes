# CI Workflow for MeetNotes
# Runs on every PR targeting main and on pushes to main (post-merge validation).
# Builds the project, runs all tests, and enforces SwiftLint (via SPM build tool plugin).
# Branch protection should be configured to require this workflow to pass before merging.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.3'

      - name: Resolve SPM dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project MeetNotes/MeetNotes/MeetNotes.xcodeproj \
            -scheme MeetNotes

      - name: Build
        run: |
          xcodebuild build \
            -project MeetNotes/MeetNotes/MeetNotes.xcodeproj \
            -scheme MeetNotes \
            -destination 'platform=macOS,arch=arm64' \
            SWIFT_STRICT_CONCURRENCY=complete

      - name: Test
        run: |
          xcodebuild test \
            -project MeetNotes/MeetNotes/MeetNotes.xcodeproj \
            -scheme MeetNotes \
            -destination 'platform=macOS,arch=arm64'
